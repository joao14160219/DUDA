      rgba(18,7,0,.80) 100%
    );

  #sparkleCanvas {
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none; z-index:5;
  }

  /* ── SCREENS ── */
  .screen {
    position:relative; z-index:10;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:2rem;
  }
  .screen.active { display:flex; }

  /* ── TYPEWRITER ── */
  .typewriter {
    overflow:hidden;
    border-right: 2px solid #e0a830;
    white-space:nowrap;
    animation: blink .75s step-end infinite;
    display:inline-block;
  }
  .typewriter.done { border-right-color: transparent; animation:none; }
  @keyframes blink { 0%,100%{border-color:#e0a830} 50%{border-color:transparent} }

  .tagline {
    font-weight:300; font-size:.78rem;
    letter-spacing:.35em; text-transform:uppercase;
    color:#e8c060; margin-bottom:1.1rem;
    text-shadow:0 1px 8px rgba(0,0,0,.8);
    opacity:0; transition: opacity .5s;
  }
  .tagline.visible { opacity:1; }

  h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,6vw,3.6rem);
    font-weight:400; line-height:1.18;
    margin-bottom:.8rem; color:#fff;
    text-shadow:0 2px 24px rgba(0,0,0,.9), 0 0 60px rgba(180,100,0,.3);
    min-height:2.4em;
  }
  h1 em { font-style:italic; color:#f0c040; }

  .divider {
    width:60px; height:1px;
    background:linear-gradient(90deg,transparent,#e0a830,transparent);
    margin:0 auto 1.4rem;
    opacity:0; transition:opacity .5s;
  }
  .divider.visible { opacity:1; }

  #screen-invite p {
    color:#e8d4a0; font-size:1rem;
    font-weight:300; margin-bottom:2.6rem;
    max-width:340px; line-height:1.75;
    text-shadow:0 1px 10px rgba(0,0,0,.9);
    opacity:0; transition:opacity .6s;
  }
  #screen-invite p.visible { opacity:1; }

  .btn-group {
    display:flex; gap:1rem; flex-wrap:wrap;
    justify-content:center; align-items:center;
    min-height:52px;
    opacity:0; transition:opacity .6s;
  }
  .btn-group.visible { opacity:1; }

  /* ── BTN YES — pulsa como coração ── */
  .btn-yes {
    background:linear-gradient(135deg,#c8861a,#7a4e0a);
    color:#fff; border:none;
    padding:.9rem 2.8rem; font-size:1.05rem;
    font-family:'Inter',sans-serif; font-weight:500;
    border-radius:50px; cursor:pointer;
    box-shadow:0 0 28px rgba(200,134,26,.55), 0 0 60px rgba(200,134,26,.2);
    animation: heartbeat 1.4s ease-in-out infinite;
    letter-spacing:.03em; min-width:176px;
  }
  @keyframes heartbeat {
    0%,100% { transform:scale(1);    box-shadow:0 0 28px rgba(200,134,26,.55); }
    14%      { transform:scale(1.08); box-shadow:0 0 50px rgba(200,134,26,.85); }
    28%      { transform:scale(1);    box-shadow:0 0 28px rgba(200,134,26,.55); }
    42%      { transform:scale(1.05); box-shadow:0 0 40px rgba(200,134,26,.7);  }
    70%      { transform:scale(1);    box-shadow:0 0 28px rgba(200,134,26,.55); }
  }
  .btn-yes:hover { animation:none; transform:scale(1.1); box-shadow:0 0 60px rgba(200,134,26,.9); }

  .btn-no {
    background:rgba(255,255,255,.08);
    color:#d4b880; border:1px solid rgba(210,160,50,.35);
    padding:.9rem 2.2rem; font-size:1.05rem;
    font-family:'Inter',sans-serif; font-weight:500;
    border-radius:50px; cursor:pointer;
    position:static; white-space:nowrap;
    z-index:999; min-width:176px;
    transition:opacity .3s, transform .2s, font-size .3s, padding .3s, min-width .3s, border-color .2s, background .2s, color .2s;
    backdrop-filter:blur(4px);
  }
  .btn-no:hover {
    background:rgba(200,150,40,.12);
    border-color:rgba(200,150,40,.55);
    color:#fff;
  }

  /* ── SCREEN 2 ── */
  #screen-yes {
    animation: fadeIn .7s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  #screen-yes h2 {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.8rem,5vw,3rem);
    font-weight:700; color:#fff; margin-bottom:.5rem;
    text-shadow:0 0 50px rgba(200,150,40,.6), 0 2px 20px rgba(0,0,0,.9);
  }
  #screen-yes .sub {
    font-family:'Playfair Display',serif;
    font-style:italic; font-size:1.1rem;
    color:#f0c040; margin-bottom:1.8rem;
    text-shadow:0 1px 12px rgba(0,0,0,.8);
  }

  /* ── COUNTDOWN ── */
  .countdown-wrap {
    background:rgba(0,0,0,.45);
    border:1px solid rgba(200,150,40,.35);
    border-radius:20px; padding:1.2rem 2rem;
    margin-bottom:1.8rem; backdrop-filter:blur(8px);
  }
  .countdown-label {
    font-size:.7rem; letter-spacing:.2em;
    text-transform:uppercase; color:#c8972a;
    margin-bottom:.8rem;
  }
  .countdown-units {
    display:flex; gap:1.2rem; justify-content:center;
  }
  .c-unit { text-align:center; }
  .c-num {
    font-family:'Playfair Display',serif;
    font-size:2.2rem; font-weight:700; color:#fff;
    line-height:1;
    text-shadow:0 0 20px rgba(200,150,40,.6);
  }
  .c-lbl {
    font-size:.65rem; letter-spacing:.12em;
    text-transform:uppercase; color:#a07840;
    margin-top:.3rem;
  }
  .c-sep {
    font-size:2rem; color:#c8861a;
    align-self:flex-start; margin-top:.1rem;
  }

  /* email */
  .email-actions {
    display:flex; gap:.6rem;
    width:100%; max-width:380px;
  }
  .email-actions input {
    flex:1; min-width:0;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(200,150,40,.4);
    border-radius:50px; padding:.85rem 1.3rem;
    color:#fff; font-size:.9rem;
    font-family:'Inter',sans-serif; outline:none;
    backdrop-filter:blur(6px); transition:border-color .2s;
  }
  .email-actions input::placeholder { color:#8a7050; }
  .email-actions input:focus { border-color:#e0a830; }

  .btn-email {
    background:linear-gradient(135deg,#c8861a,#7a4e0a);
    color:#fff; border:none; padding:.85rem 1.7rem;
    border-radius:50px; font-family:'Inter',sans-serif;
    font-size:.95rem; font-weight:500; cursor:pointer;
    white-space:nowrap; transition:transform .2s;
    box-shadow:0 0 28px rgba(200,134,26,.3);
  }
  .btn-email:hover { transform:scale(1.05); }
  .btn-email:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  .send-status {
    color:#f0d070; font-size:.82rem;
    margin-top:.8rem; min-height:1.3rem;
    max-width:340px; line-height:1.6;
    text-shadow:0 1px 8px rgba(0,0,0,.8);
  }

  @media (max-width:520px) {
    .email-actions { flex-direction:column; }
    .c-num { font-size:1.7rem; }
  }
</style>
</head>
<body>

<div id="bg-photo"></div>
<canvas id="sparkleCanvas"></canvas>

<!-- SCREEN 1 -->
<div class="screen active" id="screen-invite">
  <div class="tagline" id="tagline">✦ convite formal ✦</div>
  <h1 id="h1-text"></h1>
  <div class="divider" id="divider"></div>
  <p id="subtitle">Boa comida, boa conversa e<br>uma companhia que promete<br>não te decepcionar 🥂</p>
  <div class="btn-group" id="btn-group">
    <button class="btn-yes" onclick="handleYes()">Sim, adorei! 🐎</button>
    <button class="btn-no" id="btn-no" onclick="runAway(this)">Não...</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen-yes">
  <h2>Muito boa escolha 🐴</h2>
  <div class="sub">Olhe seu email com as informações.</div>

  <div class="countdown-wrap">

/* ══ TYPEWRITER ══ */
const lines = [
  { text: 'Duda, você aceita', italic: false },
  { text: 'jantar ', italic: false },
  { text: 'comigo?', italic: true },
];

function typeH1(lines, el, onDone) {
  // Build full HTML with em tags, then type char by char
  const fullHTML = lines.map(l => l.italic ? `<em>${l.text}</em>` : l.text).join('');
  // We'll type the visible text ignoring tags
  const fullText = lines.map(l => l.text).join('');
  let charIdx = 0;
  el.innerHTML = '<span class="typewriter"></span>';
  const cursor = el.querySelector('.typewriter');

  function type() {
    if (charIdx <= fullText.length) {
      // Rebuild HTML up to charIdx
      let count = 0;
      let html = '';
      for (const l of lines) {
        const chunk = l.text.substring(0, Math.max(0, charIdx - count));
        count += l.text.length;
        if (l.italic) html += `<em>${chunk}</em>`;
        else html += chunk;
        if (count >= charIdx) break;
      }
      cursor.innerHTML = html;
      charIdx++;
      setTimeout(type, charIdx === 1 ? 600 : 55);
    } else {
      cursor.classList.add('done');
      if (onDone) onDone();
    }
  }
  type();
}

function startSequence() {
  // 1: tagline fade in
  setTimeout(() => {
    document.getElementById('tagline').classList.add('visible');

  // 2: typewriter
  setTimeout(() => {

/* ══ SPARKLE BURST ══ */
const bc = document.getElementById('sparkleCanvas');
const bctx = bc.getContext('2d');
bc.width = window.innerWidth; bc.height = window.innerHeight;
window.addEventListener('resize', () => { bc.width = window.innerWidth; bc.height = window.innerHeight; });
let sparks = [];

function burstSparks() {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 240; i++) {
    const a = Math.random() * Math.PI * 2, sp = Math.random() * 17 + 3;
    const hue = 22 + Math.random() * 38;
    sparks.push({ x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:Math.random()*.02+.007,
      size:Math.random()*5+1,
      color:`hsl(${hue},98%,${53+Math.random()*27}%)` });
  }
  animS();
}
function animS() {
  bctx.clearRect(0, 0, bc.width, bc.height);
  sparks = sparks.filter(s => s.life > 0);
  for (const s of sparks) {
    s.x+=s.vx; s.y+=s.vy; s.vy+=.22; s.life-=s.decay;
    bctx.globalAlpha = s.life;
    bctx.fillStyle = s.color;
    bctx.shadowBlur = 10; bctx.shadowColor = s.color;
    bctx.beginPath(); bctx.arc(s.x, s.y, s.size, 0, Math.PI*2); bctx.fill();
  }
  bctx.globalAlpha = 1; bctx.shadowBlur = 0;
  if (sparks.length > 0) requestAnimationFrame(animS);
}

/* ══ NO BUTTON — encolhe até sumir ══ */
let nc = 0;
const noSizes  = [1, .85, .7, .55, .4, .25, 0];
const noMsgs   = ['Não...','Que isso!','Para!','Vai sim!','Insiste!','🐎💨',''];

function runAway(btn) {
  nc++;
  const idx = Math.min(nc, noSizes.length - 1);
  const scale = noSizes[idx];
  if (scale === 0) { btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; return; }
  btn.style.position = 'fixed';
  const m = 80;
  btn.style.left = (Math.random()*(window.innerWidth  - btn.offsetWidth  - m) + m/2) + 'px';
  btn.style.top  = (Math.random()*(window.innerHeight - btn.offsetHeight - m) + m/2) + 'px';
  btn.style.transform = `scale(${scale})`;
  btn.style.opacity = String(scale);
  btn.textContent = noMsgs[idx];
}

/* ══ COUNTDOWN ══ */
function updateCountdown() {
  const target = new Date('2026-06-25T20:00:00');
  const now    = new Date();
  const diff   = target - now;
  if (diff <= 0) {
    document.getElementById('cd-d').textContent = '00';
    document.getElementById('cd-h').textContent = '00';
    document.getElementById('cd-m').textContent = '00';
    document.getElementById('cd-s').textContent = '00';
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000)  / 60000);
  const s = Math.floor((diff % 60000)    / 1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
}
